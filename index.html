<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>PowerPoint to PDF Converter</title>
    <style>
        body {
            font-family: Arial, sans-serif;
            background-color: #f4f4f4;
            margin: 0;
            padding: 20px;
        }
        h1 {
            text-align: center;
        }
        .container {
            max-width: 600px;
            margin: auto;
            background: white;
            padding: 20px;
            border-radius: 8px;
            box-shadow: 0 0 10px rgba(0, 0, 0, 0.1);
        }
        input[type="file"] {
            width: 100%;
            margin: 10px 0;
        }
        button {
            background-color: #28a745;
            color: white;
            padding: 10px;
            border: none;
            border-radius: 5px;
            cursor: pointer;
        }
        button:hover {
            background-color: #218838;
        }
    </style>
</head>
<body>
    <div class="container">
        <h1>PowerPoint to PDF Converter</h1>
        <input type="file" id="pptFile" accept=".ppt,.pptx" />
        <button id="convertBtn">Convert to PDF</button>
    </div>
    <script>
        document.getElementById('convertBtn').addEventListener('click', function() {
            const fileInput = document.getElementById('pptFile');
            if (fileInput.files.length === 0) {
                alert('Please select a PowerPoint file to convert.');
            } else {
                alert('Conversion functionality is not implemented yet.');
            }
        });
    </script>
</body>
</html>
